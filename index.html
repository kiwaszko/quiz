<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Mini App Hello</title>
<script src="https://telegram.org/js/telegram-web-app.js?61"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  h1 {
    color: #333;
  }
  button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background-color: #4caf50;
    color: white;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover {
    background-color: #45a049;
  }
</style>
</head>
<body>

<h1>Send Hello to User</h1>
<button id="sendButton">Send 😊 Hello!</button>

<script>
if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.expand(); // expand to full height

    const button = document.getElementById("sendButton");
    button.addEventListener("click", () => {
        // send data to bot
        const message = "😊 Hello!";
        tg.sendData(message);
        tg.close();
    });
} else {
    alert("Please open this Mini App through the Telegram app.");
}
</script>

</body>
</html>
