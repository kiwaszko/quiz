<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Mini App InitData Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #f0f0f0; padding: 20px; }
    h1 { color: #818cf8; }
    pre { background: #0f0c29; padding: 15px; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Telegram WebApp.initData Viewer</h1>
  <div id="info">
    Loading initData...
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram?.WebApp;

    function displayInitData() {
      if (!tg) {
        document.getElementById("info").innerText = "Telegram WebApp object not found.";
        return;
      }

      tg.ready();

      const infoDiv = document.getElementById("info");

      const data = {
        initData: tg.initData,
        initDataUnsafe: tg.initDataUnsafe,
        user: tg.initDataUnsafe?.user || null,
        receiver: tg.initDataUnsafe?.receiver || null,
        chat: tg.initDataUnsafe?.chat || null,
        chat_type: tg.initDataUnsafe?.chat_type || null,
        chat_instance: tg.initDataUnsafe?.chat_instance || null,
        start_param: tg.initDataUnsafe?.start_param || null,
        can_send_after: tg.initDataUnsafe?.can_send_after || null,
        signature: tg.initDataUnsafe?.signature || null
      };

      infoDiv.innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
    }

    document.addEventListener("DOMContentLoaded", displayInitData);
  </script>
</body>
</html>
