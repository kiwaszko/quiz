<script src="https://telegram.org/js/telegram-web-app.js?61"></script>

<style>
  body {
    font-family: sans-serif;
  }

  #loader {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.9);
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #ccc;
    border-top: 5px solid #333;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- Form -->
<form id="myForm">
  <button type="submit">Submit</button>
</form>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxPJgB9p0FKquzNqoZFyvtyvxxfzC1DT3EI2exZRAy5-_CvMWqJn7cw662Zj0h2v5ab/exec";

const form = document.getElementById("myForm");
const loader = document.getElementById("loader");

// 🚫 Block non-Telegram
if (!window.Telegram || !window.Telegram.WebApp) {
  document.body.innerHTML = "<h2>❌ Open inside Telegram</h2>";
  throw new Error("Not Telegram");
}

const tg = window.Telegram.WebApp;
const user = tg.initDataUnsafe?.user;

if (!user) {
  document.body.innerHTML = "<h2>❌ No Telegram user</h2>";
  throw new Error("No user");
}

form.addEventListener("submit", e => {
  e.preventDefault();

  // 🔄 Show loader & disable form
  loader.style.display = "flex";
  form.style.display = "none";

  const formData = new FormData();
  formData.append("name", user.username || "unknown_user");
  formData.append("email", (user.id || "0") + "_" + (user.first_name || "NoName"));
  formData.append("message", Math.floor(Math.random() * 1000000));

  fetch(scriptURL, {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(res => {
    console.log(res);

    // ✅ Success
    document.body.innerHTML = "<h2>✅ Sent successfully</h2>";
  })
  .catch(err => {
    console.error(err);

    // ❌ Error → show form again
    loader.style.display = "none";
    form.style.display = "block";

    alert("Something went wrong. Try again.");
  });
});
</script>
